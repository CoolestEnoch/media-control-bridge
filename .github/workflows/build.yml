name: build-x86_64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install runtime build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev
      - name: Build
        run: |
          cd rust/media-control-bridge
          cargo build --release --target x86_64-unknown-linux-gnu
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: media-control-bridge-x86_64-linux
          path: rust/media-control-bridge/target/x86_64-unknown-linux-gnu/release/media-control-bridge

  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: |
          cd rust/media-control-bridge
          cargo build --release --target x86_64-pc-windows-msvc
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: media-control-bridge-x86_64-windows
          path: rust/media-control-bridge/target/x86_64-pc-windows-msvc/release/media-control-bridge.exe
